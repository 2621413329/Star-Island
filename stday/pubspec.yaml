name: stday
description: 温暖陪伴型成长记录 — 成长小岛
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  flame: ^1.37.0
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.3
  flutter_svg: ^2.3.0
  collection: ^1.19.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^4.1.0
  timezone: ^0.10.0
  geolocator: ^13.0.4
  record: ^6.0.0
  just_audio: ^0.9.46
  audio_session: ^0.1.25
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: assets/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/app_icon.png
  image_path: assets/app_icon.png
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: assets/app_icon.png
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/images/buildings/
    - assets/images/decor/
    - assets/images/story_categories/
    - assets/images/story_tags/
    - assets/images/moment_details/
    - assets/images/mood_faces/
    - assets/images/companion/base/
    - assets/images/companion/props/
    - assets/images/companion/props/study/
    - assets/images/companion/props/sport/
    - assets/images/companion/props/friend/
    - assets/images/companion/props/family/
    - assets/images/companion/props/hobby/
    - assets/images/companion/props/other/
    - assets/images/companion/times/
