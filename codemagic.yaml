workflows:
  Default Workflow:
    name: iOS Release IPA

    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: development
        bundle_identifier: com.xiaoerlcx.app

    scripts:
      - name: Build IPA
        script: |
          cd stday
          flutter pub get
          # Project uses Swift Package Manager; remove stale CocoaPods artifacts from CI cache.
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          flutter build ipa --release --dart-define=API_BASE_URL=https://39.106.134.222:8000

    artifacts:
      - stday/build/ios/ipa/*.ipa
