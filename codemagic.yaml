workflows:
Default Workflow:
name: iOS Development IPA
instance_type: mac_mini_m2

environment:
  flutter: stable
  xcode: latest

  ios_signing:
    distribution_type: development
    bundle_identifier: com.xiaoerlcx.app

scripts:
  - name: Get Flutter Packages
    script: |
      cd stday
      flutter pub get

  - name: Apply Code Signing Profiles
    script: |
      xcode-project use-profiles

  - name: Build IPA
    script: |
      cd stday
      flutter build ipa --debug

artifacts:
  - stday/build/ios/ipa/*.ipa
