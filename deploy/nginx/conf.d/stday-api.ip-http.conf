# 公网 IP 直连 HTTP API（80 端口，不走 HTTPS）
#
# 用途：在 api.lcxxingyu.fun 证书 / DNS 未就绪时，让手机通过标准 80 端口访问 API。
# 运营商常会封锁 9000/8090 等非标准端口，但 80/443 一般可用。
#
# 安装前请确认 uvicorn 监听本机（与 stday-api.ssl.conf 一致）:
#   UVICORN_HOST=127.0.0.1 ./deploy/start.sh --port 8090
#
# 安装:
#   sudo cp deploy/nginx/conf.d/stday-api.ip-http.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 验证（外网）:
#   curl http://39.106.134.222/health
#
# 打包:
#   flutter build apk --release --dart-define=API_BASE_URL=http://39.106.134.222
#
# 注意：须与 stday-api.ssl.conf 共存；本文件为 default_server，仅匹配 IP / 未知 Host。
# api.lcxxingyu.fun 仍由 ssl 配置中的 server_name 精确匹配。

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 32m;

    location ~ ^/api/v1/auth/(login|token|entry)$ {
        limit_req zone=auth_login burst=5 nodelay;

        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=2 nodelay;

        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @rate_limit_json {
        default_type application/json;
        return 429 '{"code":429,"message":"请求过于频繁，请稍后再试","data":null}';
    }
}
