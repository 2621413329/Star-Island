# 成长小岛 API — HTTPS（api.lcxxingyu.fun）
#
# 前提:
#   1. DNS: api.lcxxingyu.fun → 服务器公网 IP
#   2. uvicorn 监听 127.0.0.1:8000（不对公网暴露）
#   3. 已申请证书: /etc/letsencrypt/live/api.lcxxingyu.fun/
#   4. /etc/nginx/nginx.conf 的 http 块已包含 limit_req_zone（见 deploy/nginx/snippets/limit_req_zones.conf）
#
# 安装:
#   sudo bash deploy/nginx/install-https.sh ssl
#
# 或手动:
#   sudo cp deploy/nginx/conf.d/stday-api.ssl.conf /etc/nginx/conf.d/stday-api.ssl.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 验证:
#   curl https://api.lcxxingyu.fun/health

upstream stday_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP：certbot 续期验证 + 跳转 HTTPS
server {
    listen 80;
    server_name api.lcxxingyu.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.lcxxingyu.fun;

    ssl_certificate     /etc/letsencrypt/live/api.lcxxingyu.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lcxxingyu.fun/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;

    location ~ ^/api/v1/auth/(login|token|entry)$ {
        limit_req zone=auth_login burst=5 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        error_page 429 = @rate_limit_json;
    }

    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=2 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        error_page 429 = @rate_limit_json;
    }

    location / {
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location @rate_limit_json {
        default_type application/json;
        return 429 '{"code":429,"message":"请求过于频繁，请稍后再试","data":null}';
    }
}
