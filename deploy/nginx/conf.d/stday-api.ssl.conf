# 成长小岛 API — HTTPS（Let's Encrypt / 阿里云证书）
#
# 域名示例: api.lcxxingyu.fun
# 安装前请先将 DNS A 记录指向服务器公网 IP。
#
# 裸机部署:
#   1. 将本文件复制到 /etc/nginx/conf.d/stday-api.ssl.conf
#   2. 将 deploy/nginx/nginx.conf 中 limit_req_zone 合并进 /etc/nginx/nginx.conf
#   3. 先使用 HTTP 版完成 certbot 申请，或手动填写 ssl_certificate 路径
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# uvicorn 建议只监听本机（由 Nginx 对外提供 HTTPS）:
#   UVICORN_HOST=127.0.0.1 ./deploy/start.sh --port 8090

upstream stday_api {
    server 127.0.0.1:8090;
    keepalive 32;
}

# HTTP：用于 certbot 验证 & 跳转 HTTPS
server {
    listen 80;
    server_name api.lcxxingyu.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.lcxxingyu.fun;

    # certbot 申请后会自动写入；手动部署时改为实际路径
    ssl_certificate     /etc/letsencrypt/live/api.lcxxingyu.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lcxxingyu.fun/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;

    location ~ ^/api/v1/auth/(login|token|entry)$ {
        limit_req zone=auth_login burst=5 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        error_page 429 = @rate_limit_json;
    }

    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=2 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        error_page 429 = @rate_limit_json;
    }

    location / {
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location @rate_limit_json {
        default_type application/json;
        return 429 '{"code":429,"message":"请求过于频繁，请稍后再试","data":null}';
    }
}
