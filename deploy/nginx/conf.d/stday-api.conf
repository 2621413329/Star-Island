# 成长小岛 API — HTTP 反代（当前使用）
#
# 安装:
#   sudo bash deploy/nginx/install-http.sh
#
# 或手动:
#   sudo cp deploy/nginx/conf.d/stday-api.conf /etc/nginx/conf.d/stday-api.conf
#   sudo rm -f /etc/nginx/conf.d/stday-api.ssl.conf   # 若服务器上有未注释的 ssl 配置须先移除
#   sudo nginx -t && sudo systemctl reload nginx
#
# 验证:
#   curl http://api.lcxxingyu.fun/health
#   curl http://39.106.134.222/health
#
# 后端须监听本机:
#   UVICORN_HOST=127.0.0.1 ./deploy/start.sh --port 8000
#
# 日后切换 HTTPS: 见 deploy/nginx/conf.d/stday-api.ssl.conf（已注释模板）

upstream stday_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name api.lcxxingyu.fun 39.106.134.222 _;

    client_max_body_size 32m;

    location ~ ^/api/v1/auth/(login|token|entry)$ {
        limit_req zone=auth_login burst=5 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=2 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    location / {
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @rate_limit_json {
        default_type application/json;
        return 429 '{"code":429,"message":"请求过于频繁，请稍后再试","data":null}';
    }
}
