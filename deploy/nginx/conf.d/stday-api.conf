# 【已废弃】旧版 HTTP 反代（监听 80，server_name _）
# 请改用 HTTPS 配置:
#   sudo bash deploy/nginx/install-https.sh bootstrap
#   sudo bash deploy/nginx/install-https.sh ssl
#
# 若服务器上仍有本文件，安装脚本会自动 mv 为 stday-api.conf.bak

upstream stday_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 32m;

    # 登录相关：login / token / entry
    location ~ ^/api/v1/auth/(login|token|entry)$ {
        limit_req zone=auth_login burst=5 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    # 注册
    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=2 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    # 其余 API（不限流，或可按需扩展）
    location / {
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @rate_limit_json {
        default_type application/json;
        return 429 '{"code":429,"message":"请求过于频繁，请稍后再试","data":null}';
    }
}
