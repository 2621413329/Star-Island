# 成长小岛 API — Nginx 反向代理与认证限流
#
# 安装（Linux 裸机）:
#   sudo cp deploy/nginx/conf.d/stday-api.conf /etc/nginx/conf.d/
#   将 deploy/nginx/nginx.conf 中 limit_req_zone 段落合并进 /etc/nginx/nginx.conf 的 http 块
#   sudo nginx -t && sudo systemctl reload nginx
#
# 说明:
# - Nginx 在入口做第一道限流，应用层 Redis 做第二道（多实例共享计数）
# - 务必设置 X-Real-IP / X-Forwarded-For，供后端 Redis 按真实 IP 限流

upstream stday_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 32m;

    # 登录相关：login / token / entry
    location ~ ^/api/v1/auth/(login|token|entry)$ {
        limit_req zone=auth_login burst=5 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    # 注册
    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=2 nodelay;

        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 429 = @rate_limit_json;
    }

    # 其余 API（不限流，或可按需扩展）
    location / {
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @rate_limit_json {
        default_type application/json;
        return 429 '{"code":429,"message":"请求过于频繁，请稍后再试","data":null}';
    }
}
