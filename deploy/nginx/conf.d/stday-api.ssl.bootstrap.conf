# 第一阶段：申请 Let's Encrypt 证书前使用（仅 HTTP:80）
#
# 安装:
#   sudo bash deploy/nginx/install-https.sh bootstrap
#
# 或手动:
#   sudo cp deploy/nginx/conf.d/stday-api.ssl.bootstrap.conf /etc/nginx/conf.d/stday-api.ssl.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 验证:
#   curl http://api.lcxxingyu.fun/health
#
# 申请证书:
#   sudo certbot certonly --webroot -w /var/www/certbot -d api.lcxxingyu.fun
#
# 证书就绪后:
#   sudo bash deploy/nginx/install-https.sh ssl

upstream stday_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.lcxxingyu.fun;

    client_max_body_size 32m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
