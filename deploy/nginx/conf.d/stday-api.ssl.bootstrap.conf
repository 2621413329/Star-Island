# 第一阶段：申请证书前使用（仅 HTTP:80，无 ssl_certificate）
# 证书就绪后替换为 stday-api.ssl.conf（含 443）
#
# 用法:
#   sudo mv /etc/nginx/conf.d/stday-api.conf /etc/nginx/conf.d/stday-api.conf.bak
#   sudo cp deploy/nginx/conf.d/stday-api.ssl.bootstrap.conf /etc/nginx/conf.d/stday-api.ssl.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot certonly --webroot -w /var/www/certbot -d api.lcxxingyu.fun

upstream stday_api {
    server 127.0.0.1:8090;
    keepalive 32;
}

server {
    listen 80;
    server_name api.lcxxingyu.fun;

    client_max_body_size 32m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~ ^/api/v1/auth/(login|token|entry)$ {
        limit_req zone=auth_login burst=5 nodelay;
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        error_page 429 = @rate_limit_json;
    }

    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=2 nodelay;
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        error_page 429 = @rate_limit_json;
    }

    location / {
        proxy_pass http://stday_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @rate_limit_json {
        default_type application/json;
        return 429 '{"code":429,"message":"请求过于频繁，请稍后再试","data":null}';
    }
}
